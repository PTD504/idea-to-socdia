name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and Push Backend Image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/idea-socdia-backend -f Dockerfile.backend .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/idea-socdia-backend

      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: idea-socdia-backend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/idea-socdia-backend
          region: us-central1
          flags: --allow-unauthenticated
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Build and Push Frontend Image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/idea-socdia-frontend -f Dockerfile.frontend .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/idea-socdia-frontend

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: idea-socdia-frontend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/idea-socdia-frontend
          region: us-central1
          flags: --allow-unauthenticated
          env_vars: |
            BACKEND_URL=${{ secrets.BACKEND_URL }}
