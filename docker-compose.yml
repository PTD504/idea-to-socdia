version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: idea_socdia_backend
    ports:
      - "8000:8080"
    env_file:
      - .env
    volumes:
      # Map the local static directory for debugging generated files
      - ./frontend/static:/app/frontend/static

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Pass the backend URL during the build stage
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: idea_socdia_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
