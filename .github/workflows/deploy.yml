name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'Dockerfile.*'
      - '.github/workflows/**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REPO_NAME: socdia-repo

jobs:
  # --- BACKEND ---
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Check for Backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile.backend'
              - 'requirements.txt'
              - '.github/workflows/deploy.yml'

      - name: Authenticate to Google Cloud
        if: steps.filter.outputs.backend == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        if: steps.filter.outputs.backend == 'true'
        uses: google-github-actions/setup-gcloud@v2

      # Configure Docker Authentication
      - name: Configure Docker Authentication
        if: steps.filter.outputs.backend == 'true'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Backend Image
        if: steps.filter.outputs.backend == 'true'
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }}"
          docker build -t $IMAGE_PATH -f Dockerfile.backend .
          docker push $IMAGE_PATH

      - name: Deploy Backend to Cloud Run
        if: steps.filter.outputs.backend == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: idea-socdia-backend
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: --allow-unauthenticated
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}

  # --- FRONTEND ---
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for Frontend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'Dockerfile.frontend'
              - '.github/workflows/deploy.yml'

      - name: Authenticate to Google Cloud
        if: steps.filter.outputs.frontend == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        if: steps.filter.outputs.frontend == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        if: steps.filter.outputs.frontend == 'true'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push Frontend Image
        if: steps.filter.outputs.frontend == 'true'
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${{ github.sha }}"
          docker build --build-arg NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_URL }} -t $IMAGE_PATH -f Dockerfile.frontend .
          docker push $IMAGE_PATH

      - name: Deploy Frontend to Cloud Run
        if: steps.filter.outputs.frontend == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: idea-socdia-frontend
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: --allow-unauthenticated
          env_vars: |
            NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_URL }}